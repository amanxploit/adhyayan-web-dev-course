<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0px;
            padding: 0px;
            height: 100vh;
        }

        .Card {
            display: flex;
            background-color: aqua;
            border-radius: 20px;
            margin: 20px;
            padding: 20px;
            align-items: center;
            gap: 30px;


        }

        #logo {
            padding: 10px;
            background-color: black;
            color: white;
            border-radius: 100%;
        }
    </style>
</head>

<body>
    <input type="text" id="letter">
    <input type="text" id="name">
    <button onclick="add()">+</button>

    <div id="main">

    </div>
    

    <script>


        function add() {
            var _letter = document.getElementById("letter");
            var _name = document.getElementById("name");

            var _main = document.getElementById("main");

            _main.innerHTML+=`
            <div class="Card">
        <div id="logo">${_letter.value}</div>
        <div id="name">${_name.value}</div>
    </div>
            `
        }



    </script>




</body>

</html>
