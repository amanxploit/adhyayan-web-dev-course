<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation (same as index.html) -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="/" class="flex items-center space-x-2">
                    <i class="fas fa-shopping-bag text-3xl text-primary"></i>
                    <span class="text-2xl font-bold text-gray-800">Shop<span class="text-primary">Hub</span></span>
                </a>
                <a href="/" class="text-secondary hover:text-blue-700">Continue Shopping</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Shopping Cart</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Cart Items -->
            <div class="lg:w-2/3">
                <div id="cartItems" class="bg-white rounded-lg shadow-md">
                    <!-- Cart items will be loaded here -->
                </div>
            </div>
            
            <!-- Order Summary -->
            <div class="lg:w-1/3">
                <div class="bg-white rounded-lg shadow-md p-6 sticky top-24">
                    <h2 class="text-xl font-bold mb-4">Order Summary</h2>
                    <div class="space-y-3 mb-4">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Subtotal</span>
                            <span id="subtotal">₹0</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">Shipping</span>
                            <span class="text-green-600">FREE</span>
                        </div>
                        <div class="border-t pt-3">
                            <div class="flex justify-between font-bold text-lg">
                                <span>Total</span>
                                <span id="total">₹0</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="checkout()" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            checkAuth();
        });
        
        async function loadCart() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/cart`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    displayCart(data.cart, data.total);
                }
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }
        
        function displayCart(cart, total) {
            const cartContainer = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-shopping-cart text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500 text-lg">Your cart is empty</p>
                        <a href="/" class="inline-block mt-4 bg-secondary text-white px-6 py-2 rounded-lg">Continue Shopping</a>
                    </div>
                `;
                document.getElementById('subtotal').textContent = '₹0';
                document.getElementById('total').textContent = '₹0';
                return;
            }
            
            cartContainer.innerHTML = cart.map(item => `
                <div class="flex flex-col sm:flex-row items-center p-4 border-b">
                    <img src="${item.product.images[0]}" alt="${item.product.name}" class="w-24 h-24 object-cover rounded">
                    <div class="flex-1 sm:ml-4 mt-3 sm:mt-0">
                        <h3 class="font-semibold">${item.product.name}</h3>
                        <p class="text-gray-600 text-sm">${item.product.brand}</p>
                        <div class="flex items-center space-x-2 mt-1">
                            <span class="text-lg font-bold">₹${item.product.price.toLocaleString()}</span>
                            <span class="text-gray-500 line-through text-sm">₹${item.product.originalPrice.toLocaleString()}</span>
                            <span class="text-green-600 text-sm">${item.product.discount}% off</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3 mt-3 sm:mt-0">
                        <button onclick="updateQuantity(${item.productId}, ${item.quantity - 1})" class="w-8 h-8 bg-gray-200 rounded-full hover:bg-gray-300">-</button>
                        <span class="w-8 text-center">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.productId}, ${item.quantity + 1})" class="w-8 h-8 bg-gray-200 rounded-full hover:bg-gray-300">+</button>
                        <button onclick="removeItem(${item.productId})" class="ml-4 text-red-500 hover:text-red-700">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="ml-4 text-right">
                        <p class="font-bold">₹${item.totalPrice.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('subtotal').textContent = `₹${total.toLocaleString()}`;
            document.getElementById('total').textContent = `₹${total.toLocaleString()}`;
        }
        
        async function updateQuantity(productId, newQuantity) {
            if (newQuantity < 1) return;
            
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/cart/update`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ productId, quantity: newQuantity })
                });
                
                if (response.ok) {
                    loadCart();
                }
            } catch (error) {
                console.error('Error updating quantity:', error);
            }
        }
        
        async function removeItem(productId) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/cart/remove/${productId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    loadCart();
                }
            } catch (error) {
                console.error('Error removing item:', error);
            }
        }
        
        function checkout() {
            alert('Checkout functionality would be implemented here!');
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
