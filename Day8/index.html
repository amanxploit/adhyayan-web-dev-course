<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <center style="margin-top: 200px;">
        <img src="./img/logo.png">
        <form class="search-container" action="https://www.google.com/search" method="GET">
            <input type="search" name="q" placeholder="Search Google......." class="input-search">
            <button class="search-btn">Search</button>
        </form>

        <div class="links">
            <div class="links-container">
                <a href="https://www.google.com/imghp?hl=en&tab=ri&ogbl" class="link">Images</a>
                <a href="https://maps.google.com/maps?hl=en&tab=rl&ogbl" class="link">Maps</a>
                <a href="https://play.google.com/?hl=en&tab=w8&ogbl" class="link">Play</a>
                <a href="https://news.google.com/?tab=wn&ogbl" class="link">News</a>
            </div>
        </div>
    </center>
</body>

</html>
