<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md p-8 space-y-6 bg-white text-black rounded-2xl shadow-2xl">
    
    <!-- Title -->
    <div class="text-center">
      <h2 class="text-3xl font-bold">Create Account</h2>
      <p class="text-gray-500 text-sm mt-1">Join us today</p>
    </div>

    <!-- Form -->
    <form class="space-y-5">

      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium mb-1">Full Name</label>
        <input 
          type="text" 
          placeholder="Enter your name"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black transition"
        >
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input 
          type="email" 
          placeholder="Enter your email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black transition"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input 
          type="password" 
          placeholder="Create a password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black transition"
        >
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium mb-1">Confirm Password</label>
        <input 
          type="password" 
          placeholder="Confirm your password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black transition"
        >
      </div>

      <!-- Terms -->
      <div class="flex items-start gap-2 text-sm">
        <input type="checkbox" class="mt-1 accent-black">
        <span>
          I agree to the 
          <a href="#" class="underline">Terms</a> & 
          <a href="#" class="underline">Conditions</a>
        </span>
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition font-semibold"
      >
        Sign Up
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3">
      <hr class="flex-1 border-gray-300">
      <span class="text-gray-400 text-sm">OR</span>
      <hr class="flex-1 border-gray-300">
    </div>

    <!-- Social Signup -->
    <button class="w-full border border-gray-300 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-100 transition">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M21.35 11.1h-9.18v2.92h5.28c-.23 1.24-1.43 3.64-5.28 3.64-3.18 0-5.78-2.64-5.78-5.9s2.6-5.9 5.78-5.9c1.81 0 3.03.77 3.73 1.43l2.55-2.48C17.36 3.36 15.06 2.5 12.17 2.5 6.9 2.5 2.5 6.9 2.5 12s4.4 9.5 9.67 9.5c5.58 0 9.28-3.92 9.28-9.45 0-.64-.07-1.13-.1-1.45z"/>
      </svg>
      Sign up with Google
    </button>

    <!-- Login Redirect -->
    <p class="text-center text-sm text-gray-500">
      Already have an account? 
      <a href="./login.html" class="text-black font-medium hover:underline">Login</a>
    </p>

  </div>

</body>
</html>
