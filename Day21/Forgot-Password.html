<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md p-8 space-y-6 bg-white text-black rounded-2xl shadow-2xl">

    <!-- Title -->
    <div class="text-center">
      <h2 class="text-3xl font-bold">Forgot Password?</h2>
      <p class="text-gray-500 text-sm mt-1">
        Enter your email to receive a reset link
      </p>
    </div>

    <!-- Form -->
    <form class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input 
          type="email" 
          placeholder="Enter your email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black transition"
        >
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition font-semibold"
      >
        Send Reset Link
      </button>

    </form>

    <!-- Back to Login -->
    <p class="text-center text-sm text-gray-500">
      Remember your password? 
      <a href="./login.html" class="text-black font-medium hover:underline">Back to Login</a>
    </p>

  </div>

</body>
</html>
