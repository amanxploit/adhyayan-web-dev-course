<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-black text-white flex flex-col">
      <div class="p-6 text-2xl font-bold border-b border-gray-700">
        MyApp
      </div>

      <nav class="flex-1 p-4 space-y-2">
        <a href="#" class="block px-4 py-2 rounded-lg bg-white text-black font-medium">Dashboard</a>
        <a href="#" class="block px-4 py-2 rounded-lg hover:bg-gray-800">Profile</a>
        <a href="#" class="block px-4 py-2 rounded-lg hover:bg-gray-800">Settings</a>
        <a href="#" class="block px-4 py-2 rounded-lg hover:bg-gray-800">Reports</a>
      </nav>

      <div class="p-4 border-t border-gray-700">
        <button class="w-full bg-white text-black py-2 rounded-lg hover:bg-gray-200">
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">

      <!-- Navbar -->
      <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold">Dashboard</h1>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-600">Hello, User</span>
          <div class="w-8 h-8 bg-black text-white flex items-center justify-center rounded-full">
            U
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="p-6 space-y-6">

        <!-- Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          
          <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-gray-500 text-sm">Total Users</h3>
            <p class="text-2xl font-bold mt-2">1,245</p>
          </div>

          <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-gray-500 text-sm">Revenue</h3>
            <p class="text-2xl font-bold mt-2">₹45,000</p>
          </div>

          <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-gray-500 text-sm">Orders</h3>
            <p class="text-2xl font-bold mt-2">320</p>
          </div>

        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl shadow p-6">
          <h3 class="text-lg font-semibold mb-4">Recent Activity</h3>

          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b">
                  <th class="py-2">Name</th>
                  <th class="py-2">Email</th>
                  <th class="py-2">Status</th>
                </tr>
              </thead>
              <tbody>
                <tr class="border-b hover:bg-gray-50">
                  <td class="py-2">John Doe</td>
                  <td class="py-2">john@example.com</td>
                  <td class="py-2 text-green-600">Active</td>
                </tr>
                <tr class="border-b hover:bg-gray-50">
                  <td class="py-2">Jane Smith</td>
                  <td class="py-2">jane@example.com</td>
                  <td class="py-2 text-red-600">Inactive</td>
                </tr>
                <tr class="hover:bg-gray-50">
                  <td class="py-2">Alex Lee</td>
                  <td class="py-2">alex@example.com</td>
                  <td class="py-2 text-green-600">Active</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>

      </main>

    </div>

  </div>

</body>
</html>
