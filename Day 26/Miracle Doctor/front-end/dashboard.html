<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Doctor Appointment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="fas fa-stethoscope text-2xl text-blue-600 mr-2"></i>
                    <span class="font-bold text-xl text-gray-800">DoctorAppoint</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-name" class="text-gray-700"></span>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Dashboard Tabs -->
        <div class="border-b border-gray-200 mb-6">
            <nav class="-mb-px flex space-x-8">
                <button onclick="showTab('doctors')" id="tab-doctors" class="tab-btn py-2 px-1 border-b-2 font-medium text-sm">
                    <i class="fas fa-user-md mr-2"></i>Find Doctors
                </button>
                <button onclick="showTab('appointments')" id="tab-appointments" class="tab-btn py-2 px-1 border-b-2 font-medium text-sm">
                    <i class="fas fa-calendar-check mr-2"></i>My Appointments
                </button>
            </nav>
        </div>

        <!-- Doctors List Tab -->
        <div id="doctors-tab" class="tab-content">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Available Doctors</h2>
                <p class="text-gray-600">Browse and book appointment with our expert doctors</p>
            </div>
            
            <!-- Filters -->
            <div class="bg-white rounded-lg shadow p-4 mb-6">
                <select id="specialization-filter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Specializations</option>
                    <option value="Cardiologist">Cardiologist</option>
                    <option value="Dermatologist">Dermatologist</option>
                    <option value="Pediatrician">Pediatrician</option>
                </select>
            </div>
            
            <!-- Doctors Grid -->
            <div id="doctors-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Doctors will be loaded here -->
            </div>
        </div>

        <!-- Appointments Tab -->
        <div id="appointments-tab" class="tab-content hidden">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">My Appointments</h2>
                <p class="text-gray-600">View and manage your appointments</p>
            </div>
            <div id="appointments-list" class="space-y-4">
                <!-- Appointments will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Book Appointment</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form onsubmit="bookAppointment(event)">
                <input type="hidden" id="booking-doctor-id">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Doctor</label>
                    <input type="text" id="booking-doctor-name" readonly class="w-full px-4 py-2 bg-gray-100 border rounded-lg">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Appointment Date</label>
                    <input type="date" id="booking-date" required min="" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Appointment Time</label>
                    <select id="booking-time" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Select time</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Symptoms (Optional)</label>
                    <textarea id="booking-symptoms" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                    Confirm Booking
                </button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
