<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>AI Studio · Prompt to Photo Gallery</title>
    <!-- Tailwind CSS v3 + Font Awesome Icons + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        background: linear-gradient(145deg, #f9fafc 0%, #f1f5f9 100%);
      }

      .card-hover {
        transition: all 0.25s ease-in-out;
      }

      .card-hover:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
      }

      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }

      ::-webkit-scrollbar-track {
        background: #e2e8f0;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 10px;
      }

      .glass-badge {
        backdrop-filter: blur(4px);
        background: rgba(255, 255, 240, 0.7);
      }

      .footer-instagram-link {
        transition: all 0.2s ease;
      }

      .footer-instagram-link:hover {
        color: #e4405f;
        transform: scale(1.03);
      }
    </style>
  </head>

  <body class="antialiased">
    <div
      class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 min-h-screen flex flex-col"
    >
      <!-- HEADER with brand & category tabs -->
      <header class="mb-10">
        <div
          class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-gray-200/80 pb-5"
        >
          <div class="flex items-center gap-2">
            <div
              class="bg-gradient-to-br from-indigo-600 to-purple-600 p-2.5 rounded-2xl shadow-md"
            >
              <i class="fas fa-magic text-white text-xl"></i>
            </div>
            <h1
              class="text-2xl md:text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-800 to-gray-900"
            >
              Prompt<span class="text-indigo-600">Pix</span>
            </h1>
            <span
              class="text-xs bg-gray-200/70 text-gray-600 px-2 py-1 rounded-full ml-2"
              >✨ AI Studio</span
            >
          </div>

          <!-- Category Tabs (including 'man' & 'women') -->
          <div class="flex flex-wrap items-center gap-2" id="categoryContainer">
            <button
              data-cat="all"
              class="category-btn active-cat px-4 py-2 rounded-full text-sm font-medium transition-all shadow-sm bg-indigo-600 text-white"
            >
              ✨ All
            </button>
            <button
              data-cat="portrait"
              class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white/70 text-gray-700 hover:bg-gray-100 border border-gray-200"
            >
              🧑‍🎨 Portrait
            </button>
            <button
              data-cat="man"
              class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white/70 text-gray-700 hover:bg-gray-100 border border-gray-200"
            >
              👨 Man
            </button>
            <button
              data-cat="women"
              class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white/70 text-gray-700 hover:bg-gray-100 border border-gray-200"
            >
              👩 Woman
            </button>
            <button
              data-cat="landscape"
              class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white/70 text-gray-700 hover:bg-gray-100 border border-gray-200"
            >
              🌄 Landscape
            </button>
            <button
              data-cat="fantasy"
              class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white/70 text-gray-700 hover:bg-gray-100 border border-gray-200"
            >
              🐉 Fantasy
            </button>
            <button
              data-cat="sci-fi"
              class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white/70 text-gray-700 hover:bg-gray-100 border border-gray-200"
            >
              🚀 Sci-Fi
            </button>
          </div>
        </div>
      </header>

      <!-- Gallery Section Title -->
      <div class="flex items-baseline justify-between mt-2 mb-5">
        <h2 class="text-xl font-semibold text-gray-800">
          <i class="fas fa-th-large mr-2 text-indigo-500"></i>Inspiration
          Gallery
        </h2>
        <p class="text-xs text-gray-400 hidden sm:block">
          click <i class="fas fa-pen-ruler text-indigo-500"></i> to explore
          prompts
        </p>
      </div>

      <!-- Cards Grid (dynamic with category filter) -->
      <div
        id="cardsGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-8 flex-1"
      >
        <!-- cards injected via JS -->
      </div>

      <!-- FOOTER with custom Instagram account -->
      <footer
        class="mt-12 pt-6 border-t border-gray-200/60 flex flex-col sm:flex-row justify-between items-center gap-3 text-sm text-gray-500"
      >
        <div class="flex items-center gap-2">
          <i class="fas fa-robot text-indigo-400"></i>
          <span>AI Photo Studio · Generate with imagination</span>
        </div>
        <a
          href="https://www.instagram.com/aman.coder.py/"
          target="_blank"
          rel="noopener noreferrer"
          class="footer-instagram-link flex items-center gap-2 bg-gray-50 hover:bg-pink-50 px-4 py-1.5 rounded-full transition shadow-sm text-gray-700 hover:text-pink-600"
        >
          <i class="fab fa-instagram text-lg"></i>
          <span class="font-medium">@aman.coder.py</span>
          <i class="fas fa-external-link-alt text-xs opacity-70"></i>
        </a>
      </footer>
    </div>

    <!-- Toast notification -->
    <div
      id="toastMsg"
      class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full shadow-xl text-sm font-medium flex items-center gap-2 z-50 transition-all duration-300 opacity-0 pointer-events-none"
    >
      <i class="fas fa-check-circle text-emerald-400"></i><span>Copied!</span>
    </div>

    <script>
      // ---------- EXPANDED CARD DATA (includes 'man' and 'women' categories) ----------
      const cardLibrary = [
        // Portrait category
        {
          id: 1,
          category: "portrait",
          prompt:
            "A romantic impressionist watercolor painting of a young couple standing close together in an intimate pose. The girl has long dark flowing hair with a small purple flower tucked near her ear, wearing a bright magenta dress that softly blends into the watercolor texture. The boy is dressed in a simple white shirt. The painting style is loose, blurry, and emotional, with soft brush strokes, smudged edges, and a dreamy unfinished look. The watercolor effect should feel expressive and fluid, with gentle color bleeding and natural paper texture visible. Background is minimal - plain textured beige paper like vintage parchment, with large empty negative space above the couple. The couple is positioned at the bottom-right corner of the frame, leaving wide space for text. Soft pastel watercolor splashes in purple and pink appear subtly around the edges.",
          imageUrl:
            "https://rajaneditz.com/wp-content/uploads/2026/04/Watercolor-Ai-Photo-Editing-Prompts-225x300.webp",
          alt: "fantasy portrait",
        },
        {
          id: 2,
          category: "portrait",
          prompt:
            "A romantic impressionist watercolor painting of a young couple standing close together in an intimate pose. The girl has long dark flowing hair with a small purple flower tucked near her ear, wearing a bright magenta dress that softly blends into the watercolor texture. The boy is dressed in a simple white shirt. The painting style is loose, blurry, and emotional, with soft brush strokes, smudged edges, and a dreamy unfinished look. The watercolor effect should feel expressive and fluid, with gentle color bleeding and natural paper texture visible. Background is minimal - plain textured beige paper like vintage parchment, with large empty negative space above the couple. The couple is positioned at the bottom-right corner of the frame, leaving wide space for text. Soft pastel watercolor splashes in purple and pink appear subtly around the edges.",
          imageUrl:
            "https://rajaneditz.com/wp-content/uploads/2026/04/Trending-Watercolor-Ai-Photo-Editing-Prompts-225x300.webp",
          alt: "fantasy portrait",
        },
        {
          id:3,
          category: "portrait",
          prompt:
            "A stylized digital watercolor illustration of a young woman with soft, realistic facial features and expressive eyes, black hair loosely tied back with strands falling around her face. She wears a red traditional dress with subtle gold detailing and delicate jewelry. Large red hibiscus flowers and green leaves surround her head and shoulders, blending into the background like ink and watercolor splashes. The composition is slightly tilted, giving a dreamy, poetic feel. Fine sketch lines, paint",
          imageUrl:
            "https://rajaneditz.com/wp-content/uploads/2026/04/Girls-Watercolor-Painting-Ai-Photo-Editing-prompts-200x300.webp",
          alt: "fantasy portrait",
        },
      ];

      // DOM elements
      const cardsGrid = document.getElementById("cardsGrid");
      const categoryBtns = document.querySelectorAll(".category-btn");
      const toastMsg = document.getElementById("toastMsg");

      // Current active category
      let activeCategory = "all";

      // Helper: show toast
      function showToast(message, icon = "fas fa-check-circle") {
        toastMsg.innerHTML = `<i class="${icon} mr-1"></i><span>${message}</span>`;
        toastMsg.classList.remove("opacity-0", "pointer-events-none");
        toastMsg.classList.add("opacity-100", "pointer-events-auto");
        setTimeout(() => {
          toastMsg.classList.remove("opacity-100", "pointer-events-auto");
          toastMsg.classList.add("opacity-0", "pointer-events-none");
        }, 2100);
      }

      // Escape HTML
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // Render cards based on active category
      function renderCards() {
        let filtered = cardLibrary;
        if (activeCategory !== "all") {
          filtered = cardLibrary.filter(
            (card) => card.category === activeCategory,
          );
        }

        if (filtered.length === 0) {
          cardsGrid.innerHTML = `<div class="col-span-full text-center py-16 text-gray-400 bg-white/30 rounded-2xl"><i class="fas fa-box-open text-4xl mb-3 opacity-60"></i><p class="text-lg">No cards in this category ✨<br><span class="text-xs">Try another tag!</span></p></div>`;
          return;
        }

        cardsGrid.innerHTML = filtered
          .map(
            (card) => `
        <div class="card-hover bg-white rounded-2xl overflow-hidden shadow-md border border-gray-100 flex flex-col transition-all duration-200 group" data-prompt="${escapeHtml(card.prompt)}" data-image="${card.imageUrl}" data-category="${card.category}">
          <div class="relative h-56 overflow-hidden bg-gray-100">
            <img src="${card.imageUrl}" loading="lazy" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" alt="${card.alt}">
            <div class="absolute top-2 right-2 glass-badge rounded-full px-2 py-0.5 text-[10px] font-semibold text-gray-700 capitalize shadow-sm">${card.category}</div>
          </div>
          <div class="p-4 flex flex-col flex-1">
            <p class="text-gray-700 text-sm leading-relaxed line-clamp-2 italic">“${escapeHtml(card.prompt)}”</p>
            <div class="flex justify-between items-center mt-4 pt-2 border-t border-gray-100">
              <button class="fill-prompt-btn text-indigo-600 hover:text-indigo-800 text-xs font-semibold flex items-center gap-1 transition"><i class="fas fa-pen-ruler"></i> Use prompt</button>
              <div class="flex gap-2">
                <button class="open-gemma-card text-emerald-600 hover:text-emerald-800 text-xs bg-gray-50 p-1.5 rounded-full w-8 h-8 flex items-center justify-center transition"><i class="fab fa-google"></i></button>
                <button class="copy-prompt-card text-gray-500 hover:text-gray-700 text-xs bg-gray-50 p-1.5 rounded-full w-8 h-8 flex items-center justify-center transition"><i class="fas fa-copy"></i></button>
              </div>
            </div>
          </div>
        </div>
      `,
          )
          .join("");

        // attach event listeners to dynamic card buttons
        document.querySelectorAll(".fill-prompt-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const cardDiv = btn.closest(".card-hover");
            const prompt = cardDiv.getAttribute("data-prompt");
            if (prompt) {
              // Instead of user generation section (removed), we show toast & copy to clipboard for convenience
              navigator.clipboard
                .writeText(prompt)
                .then(() => {
                  showToast("Prompt copied to clipboard! 📋", "fas fa-copy");
                })
                .catch(() => showToast("Could not copy", "fas fa-exclamation"));
            }
          });
        });

        document.querySelectorAll(".open-gemma-card").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const cardDiv = btn.closest(".card-hover");
            const prompt = cardDiv.getAttribute("data-prompt");
            if (prompt) {
              // Open Gemma: simulate opening Google's Gemini/Gemma interface with the prompt
              window.open(
                `https://gemini.google.com/?q=${encodeURIComponent(prompt)}`,
                "_blank",
              );
              showToast(`Opening Gemma with prompt ✨`, "fab fa-google");
            } else {
              showToast("No prompt available", "fas fa-exclamation-triangle");
            }
          });
        });

        document.querySelectorAll(".copy-prompt-card").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const cardDiv = btn.closest(".card-hover");
            const prompt = cardDiv.getAttribute("data-prompt");
            if (prompt) {
              navigator.clipboard.writeText(prompt);
              showToast("Prompt copied!", "fas fa-copy");
            } else {
              showToast("Nothing to copy", "fas fa-ban");
            }
          });
        });
      }

      // Category switching logic
      function setActiveCategory(cat) {
        activeCategory = cat;
        categoryBtns.forEach((btn) => {
          const btnCat = btn.getAttribute("data-cat");
          if (btnCat === cat) {
            btn.classList.add("bg-indigo-600", "text-white", "shadow-md");
            btn.classList.remove(
              "bg-white/70",
              "text-gray-700",
              "border-gray-200",
              "hover:bg-gray-100",
            );
          } else {
            btn.classList.remove("bg-indigo-600", "text-white", "shadow-md");
            btn.classList.add(
              "bg-white/70",
              "text-gray-700",
              "border-gray-200",
              "hover:bg-gray-100",
            );
          }
        });
        renderCards();
      }

      // Add category event listeners
      categoryBtns.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          const cat = btn.getAttribute("data-cat");
          setActiveCategory(cat);
        });
      });

      // Initialize: render all cards and set default active style
      renderCards();
      // Ensure 'All' is active by default
      document
        .querySelector('[data-cat="all"]')
        .classList.add("bg-indigo-600", "text-white");

      // Optional: small nice effect - no user generation section at all as requested.
      // We've fully removed the "Your Prompts" and generation code, also the footer now includes Instagram.
      // For Instagram: the link is visible and interactive including hover effect.
    </script>
  </body>
</html>
