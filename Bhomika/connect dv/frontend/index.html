<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanCart - Modern E-Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="text-2xl font-bold text-purple-600">
                    <i class="fas fa-store"></i> UrbanCart
                </div>
                
                <div class="hidden md:flex space-x-8">
                    <a href="#" onclick="showPage('home')" class="nav-link hover:text-purple-600">Home</a>
                    <a href="#" onclick="showPage('products')" class="nav-link hover:text-purple-600">Products</a>
                    <a href="#" onclick="showPage('categories')" class="nav-link hover:text-purple-600">Categories</a>
                    <a href="#" onclick="showPage('about')" class="nav-link hover:text-purple-600">About</a>
                    <a href="#" onclick="showPage('contact')" class="nav-link hover:text-purple-600">Contact</a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="#" onclick="showPage('cart')" class="relative">
                        <i class="fas fa-shopping-cart text-2xl text-gray-700"></i>
                        <span id="cartCount" class="absolute -top-2 -right-3 bg-red-500 text-white text-xs rounded-full px-2 py-1">0</span>
                    </a>
                    <button id="authButton" onclick="toggleAuth()" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">
                        Login
                    </button>
                    <button id="darkModeToggle" class="text-gray-700 text-xl">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="mobileMenuBtn" class="md:hidden text-2xl">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
            
            <!-- Mobile Menu -->
            <div id="mobileMenu" class="hidden md:hidden pb-4">
                <a href="#" onclick="showPage('home')" class="block py-2 hover:text-purple-600">Home</a>
                <a href="#" onclick="showPage('products')" class="block py-2 hover:text-purple-600">Products</a>
                <a href="#" onclick="showPage('categories')" class="block py-2 hover:text-purple-600">Categories</a>
                <a href="#" onclick="showPage('about')" class="block py-2 hover:text-purple-600">About</a>
                <a href="#" onclick="showPage('contact')" class="block py-2 hover:text-purple-600">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent" class="container mx-auto px-4 py-8">
        <!-- Dynamic content will be loaded here -->
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white mt-16 py-8">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <div>
                    <h3 class="text-xl font-bold mb-4">UrbanCart</h3>
                    <p>Your one-stop shop for everything!</p>
                </div>
                <div>
                    <h3 class="text-xl font-bold mb-4">Quick Links</h3>
                    <ul class="space-y-2">
                        <li><a href="#" onclick="showPage('about')">About Us</a></li>
                        <li><a href="#" onclick="showPage('contact')">Contact</a></li>
                        <li><a href="#">Privacy Policy</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="text-xl font-bold mb-4">Follow Us</h3>
                    <div class="flex space-x-4">
                        <i class="fab fa-facebook text-2xl hover:text-purple-400 cursor-pointer"></i>
                        <i class="fab fa-instagram text-2xl hover:text-purple-400 cursor-pointer"></i>
                        <i class="fab fa-twitter text-2xl hover:text-purple-400 cursor-pointer"></i>
                    </div>
                </div>
                <div>
                    <h3 class="text-xl font-bold mb-4">Newsletter</h3>
                    <div class="flex">
                        <input type="email" placeholder="Your email" class="flex-1 px-3 py-2 rounded-l text-black">
                        <button class="bg-purple-600 px-4 py-2 rounded-r hover:bg-purple-700">Subscribe</button>
                    </div>
                </div>
            </div>
            <div class="text-center mt-8 pt-4 border-t border-gray-700">
                <p>&copy; 2025 UrbanCart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
