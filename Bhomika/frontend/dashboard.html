
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">💰 ExpenseTracker</div>
            <div class="nav-right">
                <span id="user-name" class="user-name"></span>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="dashboard-container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Expenses</div>
                <div class="stat-value" id="total-expenses">$0</div>
                <div class="stat-sub">All time</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">This Month</div>
                <div class="stat-value" id="monthly-expenses">$0</div>
                <div class="stat-sub">Last 30 days</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Transactions</div>
                <div class="stat-value" id="transaction-count">0</div>
                <div class="stat-sub">Expenses logged</div>
            </div>
        </div>
        
        <!-- Add Expense Form -->
        <div class="add-expense-card">
            <h3>➕ Add New Expense</h3>
            <div class="expense-form">
                <div class="form-row">
                    <div class="input-group">
                        <label>Amount ($)</label>
                        <input type="number" id="expense-amount" placeholder="0.00" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="expense-category">
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Bills">💡 Bills</option>
                            <option value="Healthcare">🏥 Healthcare</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="expense-amount">
                    </div>                
                           <div class="input-group">
                    <label>Expense</label>
                    <input type="text" id="edit-amount">
                </div>
             
                     <div class="input-group">
                    <label>Income</label>
                    <input type="text" id="edit-amount">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <input type="text" id="edit-description">
                </div>

c                    <button id="add-expense-btn" class="add-btn">Add Expense</button>
                </div>
            </div>
        </div>
        
        <!-- Expenses List -->
        <div class="expenses-section">
            <div class="section-header">
                <h3>📋 Recent Expenses</h3>
                <div class="filter-group">
                    <select id="category-filter">
                        <option value="all">All Categories</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Bills">Bills</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div id="expenses-list" class="expenses-list">
                <div class="loading">Loading expenses...</div>
            </div>
        </div>
    </div>
    
    <!-- Edit Expense Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Expense</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="input-group">
                    <label>Amount ($)</label>
                    <input type="number" id="edit-amount" step="0.01">
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="edit-category">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Bills">Bills</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
c                <div class="input-group">
                    <label>Expense</label>
                    <input type="text" id="edit-amount">
                </div>           
                       <div class="input-group">
                    <label>Income</label>
                    <input type="text" id="edit-description">
                </div>
        
                      <div class="input-group">
                    <label>Description</label>
                    <input type="text" id="edit-description">
                </div>

                <div class="modal-buttons">
                    <button id="update-expense-btn" class="save-btn">Save Changes</button>
                    <button id="delete-expense-btn" class="delete-btn">Delete</button>
                </div>        
c                </div>

            </div>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
